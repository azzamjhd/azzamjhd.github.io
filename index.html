<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azzam's Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <button class="button bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4">
                ~
            </button>
            <ul class="hidden bg-blue-500 text-white">
                <li><a href="#hero" class="hover:text-slate-300">Home</a></li>
                <li><a href="#about" class="hover:text-slate-300">About</a></li>
                <li><a href="#projects" class="hover:text-slate-300">Projects</a></li>
                <li><a href="#contact" class="hover:text-slate-300">Contact</a></li>
            </ul>
        </nav>
    </header> 
    
    <main>
        <section id="hero">
            
        </section>

        <section id="about">

        </section>

        <section id="projects">

        </section>

        <section id="contact">

        </section>
    </main>
    
    <script>
        const button = document.querySelector('.button');
        const navUl = document.querySelector('nav ul');
        const navUlLi = document.querySelectorAll('nav ul li');

        button.addEventListener('click', () => {
            navUl.classList.toggle('hidden');
        });

        navUlLi.forEach(li => {
            li.addEventListener('click', () => {
                navUl.classList.toggle('hidden');
            });
        });
    </script>
    
</body>
</html>
